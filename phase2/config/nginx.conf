server {
    server_name orangecaramel.online;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads {
        alias /home/ubuntu/DevOps/phase1/src/public/uploads;   # nếu ứng dụng có upload file
        expires 30d;
    }

    location /images {
        alias /home/ubuntu/DevOps/phase1/src/public/uploads;
        expires 30d;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/orangecaramel.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/orangecaramel.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = orangecaramel.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name orangecaramel.online;
    return 404; # managed by Certbot


}
