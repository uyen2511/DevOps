# Phase 2
server {
    server_name phase2.orangecaramel.online;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/phase2.orangecaramel.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/phase2.orangecaramel.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

# Phase 3
server {
    server_name phase3.orangecaramel.online;

    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/phase2.orangecaramel.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/phase2.orangecaramel.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = phase2.orangecaramel.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name phase2.orangecaramel.online;
    return 404; # managed by Certbot


}
server {
    if ($host = phase3.orangecaramel.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name phase3.orangecaramel.online;
    return 404; # managed by Certbot


}